bridge:
  name: homehub-external-bridge
  mode: single_home
  token_env: homehubbridge2026k8m4q7v1s9t2

hub:
  family_id: home-001
  poll_interval_seconds: 5
  result_ttl_seconds: 86400

im:
  provider: line
  enabled: true
  mapping:
    user_id_key: userId
    chat_id_key: groupId
    message_text_key: text
    message_id_key: messageId
    timestamp_key: timestamp
  defaults:
    channel: default
    language: ja
  extra:
    reply_mode: passive
    allow_push_result: true

kv:
  home_name: my-homehub
  timezone: Asia/Tokyo
  im_label: family-im
  notes: single family deployment only
  line_channel_access_token_env: LINE_CHANNEL_ACCESS_TOKEN
  line_channel_secret_env: 3d5e8d1319d04ac0ed76790593c939d1