metadata:
  suite_id: family_agent_workflow_overall
  source_markdown: test/overall_test_cases_family_agent_workflow.md
  description: >-
    Structured dataset derived from the overall family-agent workflow test plan.
    Active cases are executable against the current /core/handle runtime.
    Pending cases remain in the dataset as implementation targets.
  fixed_now: "2026-04-16"
  transport:
    endpoint: /core/handle
    output_format: dict
    use_langraph: false

defaults:
  context:
    timezone: Asia/Tokyo
    locale: ja-JP

scenarios:
  - id: TC-P0-05
    priority: P0
    title: 批量录入家庭成员消费
    status: active
    tags: [ingestion, expense, workflow]
    session_key: family_expense_ingestion
    steps:
      - name: record_expenses
        request:
          input_text: "妈妈今天买菜消费了2000日元。昨天爸爸中午吃饭花了1000日元。昨天朱棣买糖花了500日元。昨天小羽买书花了1200日元。"
        assertions:
          - type: path_in
            path: result.task.intent
            expected_any: [data_record, record_expense]
          - type: list_length
            path: result.execution_result.final_output.extract_records.records
            expected: 4
          - type: list_contains_objects
            path: result.execution_result.final_output.extract_records.records
            expected_objects:
              - content_contains: 妈妈今天买菜
                amount: 2000
              - content_contains: 爸爸中午吃饭
                amount: 1000
              - content_contains: 朱棣买糖
                amount: 500
              - content_contains: 小羽买书
                amount: 1200

  - id: TC-P0-10
    priority: P0
    title: 查询4月份全家总消费
    status: active
    tags: [query, aggregation, expense]
    session_key: family_total_query
    steps:
      - name: seed_expenses
        request:
          input_text: "妈妈今天买菜消费了2000日元。昨天爸爸中午吃饭花了1000日元。昨天朱棣买糖花了500日元。昨天小羽买书花了1200日元。"
        assertions:
          - type: path_in
            path: result.task.intent
            expected_any: [data_record, record_expense]
      - name: query_family_total
        request:
          input_text: "4月份，全家总共消费多少？"
        assertions:
          - type: path_in
            path: result.task.intent
            expected_any: [data_query, query_expense]
          - type: path_equals
            path: result.execution_result.final_output.parse_query.query.filters
            expected: {}
          - type: path_equals
            path: result.execution_result.final_output.parse_query.query.group_by
            expected: []
          - type: path_equals
            path: result.execution_result.final_output.aggregate_query.aggregation.total_amount
            expected: 4700

  - id: TC-P0-01
    priority: P0
    title: 识别创建家庭成员智能体为长期能力意图
    status: pending
    tags: [agent, intent]
    reason: 当前总体测试入口缺少可验证的家庭管理 agent 创建与会话采集链路。

  - id: TC-P0-02
    priority: P0
    title: 家庭成员信息多轮采集
    status: pending
    tags: [agent, dialog, memory]
    reason: 当前 /core/handle 尚未提供稳定的多轮 profile collection 自动化断言面。

  - id: TC-P0-03
    priority: P0
    title: 生成家庭成员 AgentSpec
    status: pending
    tags: [agent, spec]
    reason: 当前缺少家庭成员 agent spec 的落库或查询接口用于自动校验。

  - id: TC-P0-04
    priority: P0
    title: 自动创建或绑定相关 Blueprint
    status: pending
    tags: [blueprint, workflow]
    reason: 当前缺少 family blueprint 解析结果的稳定观测接口。

  - id: TC-P0-06
    priority: P0
    title: 消费记录依赖家庭成员 Memory 绑定主键
    status: pending
    tags: [memory, entity-linking]
    reason: 当前消费记录结构仅包含 actor 文本，没有 member_id 主键断言面。

  - id: TC-P0-07
    priority: P0
    title: 录入多条家庭成员日程安排
    status: active
    tags: [schedule, ingestion]
    session_key: family_schedule_ingestion
    steps:
      - name: record_schedules
        request:
          input_text: "爸爸4月21号去大阪。妈妈4月20号PTA开会。朱棣本周六远足。"
        assertions:
          - type: path_in
            path: result.task.intent
            expected_any: [data_record, record_expense]
          - type: list_length
            path: result.execution_result.final_output.extract_records.records
            expected: 3
          - type: list_contains_objects
            path: result.execution_result.final_output.extract_records.records
            expected_objects:
              - record_type: schedule
                actor: 爸爸
                time: "2026-04-21"
                content_contains: 去大阪
              - record_type: schedule
                actor: 妈妈
                time: "2026-04-20"
                content_contains: PTA开会
              - record_type: schedule
                actor: 朱棣
                content_contains: 远足

  - id: TC-P0-08
    priority: P0
    title: 创建前一天提醒规则
    status: pending
    tags: [rule, reminder]
    reason: 当前缺少 reminder rule 的创建与查询接口用于自动验证。

  - id: TC-P0-09
    priority: P0
    title: 创建当天消费超额提醒规则
    status: pending
    tags: [rule, threshold]
    reason: 当前缺少 threshold monitoring rule 的自动化执行入口。

  - id: TC-P0-11
    priority: P0
    title: 查询4月21号爸爸的安排
    status: active
    tags: [schedule, query]
    session_key: family_schedule_query
    steps:
      - name: seed_schedules
        request:
          input_text: "爸爸4月21号去大阪。妈妈4月20号PTA开会。朱棣本周六远足。"
        assertions:
          - type: list_length
            path: result.execution_result.final_output.extract_records.records
            expected: 3
      - name: query_schedule
        request:
          input_text: "4月21号爸爸有什么安排？"
        assertions:
          - type: path_equals
            path: result.execution_result.final_output.parse_query.query.metric
            expected: list
          - type: path_equals
            path: result.execution_result.final_output.parse_query.query.time_marker
            expected: "2026-04-21"
          - type: path_equals
            path: result.execution_result.final_output.aggregate_query.aggregation.count
            expected: 1
          - type: list_contains_objects
            path: result.execution_result.final_output.aggregate_query.aggregation.matched_records
            expected_objects:
              - record_type: schedule
                actor: 爸爸
                time: "2026-04-21"
                content_contains: 去大阪

