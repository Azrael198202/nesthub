[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r api/public_api/requirements.txt"
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn api.public_api.app:app --host 0.0.0.0 --port ${PORT:-8080}"
