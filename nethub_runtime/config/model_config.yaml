# Model Configuration for LiteLLM Router
# Reference: docs/02_router/litellm_routing_design.md

model_providers:
  ollama:
    type: "ollama"
    base_url: "http://localhost:11434"
    models:
      - name: "llama2"
        enabled: true
      - name: "neural-chat"
        enabled: true
      - name: "codeup"
        enabled: true

  openai:
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    models:
      - name: "gpt-4o"
        enabled: false
      - name: "gpt-4o-mini"
        enabled: false

  claude:
    type: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    models:
      - name: "claude-3-5-sonnet-latest"
        enabled: false

  gemini:
    type: "gemini"
    api_key: "${GEMINI_API_KEY}"
    models:
      - name: "gemini-2.0-flash-free"
        enabled: true
        context_window: 1000000
        is_free_tier: true
        rate_limit_rpm: 2
      - name: "gemini-1.5-free"
        enabled: true
        context_window: 1000000
        is_free_tier: true
        rate_limit_rpm: 2

  groq:
    type: "groq"
    api_key: "${GROQ_API_KEY}"
    base_url: "https://api.groq.com"
    models:
      - name: "llama-3-70b"
        enabled: true
        latency_ms: 200
      - name: "mixtral-8x7b"
        enabled: true
        latency_ms: 150

routing_policies:
  intent_analysis:
    primary: "groq:llama-3-70b"
    fallback:
      - "groq:mixtral-8x7b"
      - "ollama:neural-chat"
      - "gemini:gemini-2.0-flash-free"
    timeout_sec: 15

  task_planning:
    primary: "ollama:llama2"
    fallback:
      - "groq:mixtral-8x7b"
      - "claude:claude-3-5-sonnet-latest"
    timeout_sec: 30

  code_generation:
    primary: "openai:gpt-4o"
    fallback:
      - "groq:mixtral-8x7b"
      - "ollama:codeup"
    timeout_sec: 60

  document_generation:
    primary: "gemini:gemini-1.5-free"
    fallback:
      - "gemini:gemini-2.0-flash-free"
      - "claude:claude-3-5-sonnet-latest"
    timeout_sec: 45

  long_context_analysis:
    primary: "gemini:gemini-1.5-free"
    fallback:
      - "gemini:gemini-2.0-flash-free"
      - "openai:gpt-4o"
    timeout_sec: 60

  fast_extraction:
    primary: "groq:mixtral-8x7b"
    fallback:
      - "groq:llama-3-70b"
      - "gemini:gemini-2.0-flash-free"
    timeout_sec: 20

  general_chat:
    primary: "groq:llama-3-70b"
    fallback:
      - "ollama:neural-chat"
      - "gemini:gemini-2.0-flash-free"
    timeout_sec: 20

  default:
    primary: "ollama:llama2"
    fallback:
      - "groq:llama-3-70b"
    timeout_sec: 30

model_params:
  temperature: 0.5
  top_p: 0.9
  max_tokens: 1200
  task_specific:
    intent_analysis:
      temperature: 0.2
      top_p: 0.8
      max_tokens: 256
    code_generation:
      temperature: 0.1
      top_p: 0.9
      max_tokens: 4096
    document_generation:
      temperature: 0.6
      top_p: 0.95
      max_tokens: 4096

provider_policies:
  groq:
    max_retries: 2
    retry_backoff_sec: 0.5
    min_request_interval_ms: 100
  gemini:
    max_retries: 2
    retry_backoff_sec: 1.0
    min_request_interval_ms: 30000
  openai:
    max_retries: 2
    retry_backoff_sec: 1.0
    min_request_interval_ms: 100
  claude:
    max_retries: 2
    retry_backoff_sec: 1.0
    min_request_interval_ms: 100
  ollama:
    max_retries: 1
    retry_backoff_sec: 0.5
    min_request_interval_ms: 0

agent_config:
  reasoning:
    max_iterations: 10
    timeout: 120
    use_model_router: true
    routing:
      fast_reasoning_model: "groq:llama-3-70b"
      long_context_model: "gemini:gemini-1.5-free"
      fallback_model: "openai:gpt-4o"

workflow_config:
  step_timeout: 60
  max_retries: 3
  enable_parallel: true

development:
  mock_llm_calls: false
  enable_debug_logs: false
