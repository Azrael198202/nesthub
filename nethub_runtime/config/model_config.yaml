# Model Configuration for LiteLLM Router
# Reference: docs/02_router/litellm_routing_design.md

model_providers:
  ollama:
    type: "ollama"
    base_url: "http://localhost:11434"
    models:
      # LLM — reasoning / analysis (local-first)
      - name: "deepseek-r1:7b"
        enabled: true
        task_tags: ["reasoning", "analysis", "document_analysis", "agent_reasoning"]
      - name: "deepseek-r1:1.5b"
        enabled: true
        task_tags: ["reasoning", "fast_extraction"]
      # LLM — multilingual / fast (local-first)
      - name: "qwen2.5:7b-instruct"
        enabled: true
        task_tags: ["general_chat", "semantic_parsing", "semantic_labeling", "llm_execution"]
      - name: "qwen2.5:3b-instruct"
        enabled: true
        task_tags: ["semantic_labeling", "fast_extraction"]
      # Multimodal (local-first)
      - name: "qwen2.5vl:7b"
        enabled: true
        task_tags: ["multimodal", "ocr", "image_understanding"]
      # Code (local-first)
      - name: "qwen3-coder:30b"
        enabled: true
        task_tags: ["code_generation"]

  openai:
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    models:
      - name: "gpt-4o"
        enabled: true
      - name: "gpt-4o-mini"
        enabled: true

  claude:
    type: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    models:
      - name: "claude-3-5-sonnet-latest"
        enabled: true

  gemini:
    type: "gemini"
    api_key: "${GEMINI_API_KEY}"
    models:
      - name: "gemini-2.0-flash"
        enabled: true
        context_window: 1000000
        is_free_tier: false
        rate_limit_rpm: 2
      - name: "gemini-2.0-flash-lite"
        enabled: true
        context_window: 1000000
        is_free_tier: false
        rate_limit_rpm: 2

  groq:
    type: "groq"
    api_key: "${GROQ_API_KEY}"
    base_url: "https://api.groq.com"
    models:
      - name: "llama-3.3-70b-versatile"
        enabled: true
        latency_ms: 200
      - name: "llama-3.1-8b-instant"
        enabled: true
        latency_ms: 150

provider_policies:
  # Per-provider behaviour overrides (used by ModelRouter._get_provider_policy)
  ollama:
    # Do NOT retry on failure — GPU OOM / timeout means a retry won't help
    max_retries: 0
    # Hard cap per single request so we fall through to remote quickly
    request_timeout_cap_sec: 15
    skip_unhealthy: true

local_composite_profiles:
  active_profile_env: "NETHUB_ACTIVE_LORA_PROFILE"
  default_profile: "lora_sft"
  profiles:
    base_local:
      enabled: true
      description: "Base local model execution without domain adapter bias."
      adapter_hint:
        mode: "base"
    lora_sft:
      enabled: true
      description: "Primary local composite profile backed by the latest validated LoRA training output."
      adapter_hint:
        mode: "lora"
        training_profile: "lora_sft"
      task_routing_overrides:
        semantic_parsing:
          primary: "ollama:qwen2.5:7b-instruct"
          fallback:
            - "ollama:qwen2.5:3b-instruct"
            - "groq:llama-3.1-8b-instant"
        document_analysis:
          primary: "ollama:deepseek-r1:7b"
          fallback:
            - "ollama:qwen2.5:7b-instruct"
            - "groq:llama-3.3-70b-versatile"
        llm_execution:
          primary: "ollama:qwen2.5:7b-instruct"
          fallback:
            - "ollama:deepseek-r1:7b"
            - "groq:llama-3.3-70b-versatile"

routing_policies:
  # ----------------------------------------------------------------
  # Escalation gate (global defaults):
  #   allow_cloud: true  — permit falling back to cloud when all local models fail
  #   Per-task override: add  allow_cloud_escalation: false  inside any task block
  # ----------------------------------------------------------------
  escalation:
    allow_cloud: true

  # ----------------------------------------------------------------
  # Local-first priority:
  #   1. Ollama local (DeepSeek-R1 / Qwen2.5 — free, private, fast)
  #   2. Free remote API (Groq / Gemini free-tier)
  #   3. Paid remote API (OpenAI / Anthropic) — last resort
  # ----------------------------------------------------------------

  intent_analysis:
    primary: "ollama:qwen2.5:7b-instruct"
    fallback:
      - "groq:llama-3.3-70b-versatile"
      - "groq:llama-3.1-8b-instant"
      - "gemini:gemini-2.0-flash"
      - "openai:gpt-4o-mini"
    timeout_sec: 15

  task_planning:
    primary: "ollama:qwen2.5:7b-instruct"
    fallback:
      - "groq:llama-3.1-8b-instant"
      - "gemini:gemini-2.0-flash"
      - "openai:gpt-4o-mini"
      - "claude:claude-3-5-sonnet-latest"
    timeout_sec: 30

  reasoning:
    # DeepSeek-R1 is the recommended local reasoning model
    primary: "ollama:deepseek-r1:7b"
    fallback:
      - "ollama:deepseek-r1:1.5b"
      - "groq:llama-3.3-70b-versatile"
      - "gemini:gemini-2.0-flash"
      - "openai:gpt-4o"
    timeout_sec: 60

  document_analysis:
    # DeepSeek-R1 for deep analysis; fall to Groq quickly on M2 GPU OOM
    primary: "ollama:deepseek-r1:7b"
    fallback:
      - "groq:llama-3.3-70b-versatile"
      - "groq:llama-3.1-8b-instant"
      - "gemini:gemini-2.0-flash"
      - "ollama:qwen2.5:7b-instruct"
      - "openai:gpt-4o"
    timeout_sec: 90

  agent_reasoning:
    primary: "ollama:deepseek-r1:7b"
    fallback:
      - "ollama:qwen2.5:7b-instruct"
      - "groq:llama-3.3-70b-versatile"
      - "openai:gpt-4o"
    timeout_sec: 120

  code_generation:
    primary: "ollama:qwen3-coder:30b"
    fallback:
      - "ollama:qwen2.5:7b-instruct"
      - "groq:llama-3.1-8b-instant"
      - "openai:gpt-4o"
    timeout_sec: 60

  document_generation:
    primary: "ollama:qwen2.5:7b-instruct"
    fallback:
      - "ollama:deepseek-r1:7b"
      - "gemini:gemini-2.0-flash"
      - "gemini:gemini-2.0-flash-lite"
      - "openai:gpt-4o-mini"
      - "claude:claude-3-5-sonnet-latest"
    timeout_sec: 45

  long_context_analysis:
    primary: "ollama:deepseek-r1:7b"
    fallback:
      - "gemini:gemini-2.0-flash"
      - "gemini:gemini-2.0-flash-lite"
      - "openai:gpt-4o"
    timeout_sec: 60

  fast_extraction:
    primary: "ollama:qwen2.5:3b-instruct"
    fallback:
      - "ollama:deepseek-r1:1.5b"
      - "groq:llama-3.1-8b-instant"
      - "groq:llama-3.3-70b-versatile"
      - "gemini:gemini-2.0-flash"
    timeout_sec: 20

  semantic_parsing:
    primary: "ollama:qwen2.5:7b-instruct"
    fallback:
      - "groq:llama-3.1-8b-instant"
      - "gemini:gemini-2.0-flash"
    timeout_sec: 20

  semantic_aggregation:
    primary: "ollama:qwen2.5:7b-instruct"
    fallback:
      - "gemini:gemini-2.0-flash"
      - "groq:llama-3.3-70b-versatile"
    timeout_sec: 30

  semantic_learning:
    primary: "ollama:deepseek-r1:7b"
    fallback:
      - "groq:llama-3.3-70b-versatile"
      - "gemini:gemini-2.0-flash"
    timeout_sec: 20

  semantic_labeling:
    primary: "ollama:qwen2.5:3b-instruct"
    fallback:
      - "ollama:deepseek-r1:1.5b"
      - "groq:llama-3.1-8b-instant"
      - "gemini:gemini-2.0-flash"
    timeout_sec: 15

  llm_execution:
    primary: "ollama:qwen2.5:7b-instruct"
    fallback:
      - "ollama:deepseek-r1:7b"
      - "groq:llama-3.3-70b-versatile"
      - "gemini:gemini-2.0-flash"
    timeout_sec: 30

  general_chat:
    primary: "ollama:qwen2.5:7b-instruct"
    fallback:
      - "ollama:deepseek-r1:7b"
      - "groq:llama-3.3-70b-versatile"
      - "gemini:gemini-2.0-flash"
    timeout_sec: 20

  ocr:
    # Qwen2.5-VL is multimodal; PaddleOCR acquired via CapabilityAcquisitionService
    primary: "ollama:qwen2.5vl:7b"
    fallback:
      - "ollama:qwen2.5:7b-instruct"
      - "gemini:gemini-2.0-flash"
    timeout_sec: 30

  web_summarize:
    primary: "ollama:qwen2.5:7b-instruct"
    fallback:
      - "ollama:deepseek-r1:7b"
      - "groq:llama-3.1-8b-instant"
      - "gemini:gemini-2.0-flash"
    timeout_sec: 30

  content_filter:
    primary: "ollama:qwen2.5:3b-instruct"
    fallback:
      - "ollama:qwen2.5:7b-instruct"
      - "groq:llama-3.1-8b-instant"
    timeout_sec: 15

  default:
    primary: "ollama:qwen2.5:7b-instruct"
    fallback:
      - "ollama:deepseek-r1:7b"
      - "groq:llama-3.3-70b-versatile"
      - "openai:gpt-4o-mini"
    timeout_sec: 30

model_params:
  temperature: 0.5
  top_p: 0.9
  max_tokens: 1200
  task_specific:
    intent_analysis:
      temperature: 0.2
      top_p: 0.8
      max_tokens: 256
    code_generation:
      temperature: 0.1
      top_p: 0.9
      max_tokens: 4096
    document_generation:
      temperature: 0.6
      top_p: 0.95
      max_tokens: 4096

provider_policies:
  groq:
    max_retries: 2
    retry_backoff_sec: 0.5
    min_request_interval_ms: 100
  gemini:
    max_retries: 2
    retry_backoff_sec: 1.0
    min_request_interval_ms: 30000
  openai:
    max_retries: 2
    retry_backoff_sec: 1.0
    min_request_interval_ms: 100
  claude:
    max_retries: 2
    retry_backoff_sec: 1.0
    min_request_interval_ms: 100
  ollama:
    max_retries: 1
    retry_backoff_sec: 0.5
    min_request_interval_ms: 0
    skip_unhealthy: true
    healthcheck_timeout_sec: 2
    request_timeout_cap_sec: 120

agent_config:
  reasoning:
    max_iterations: 10
    timeout: 120
    use_model_router: true
    routing:
      fast_reasoning_model: "groq:llama-3.3-70b-versatile"
      long_context_model: "gemini:gemini-2.0-flash"
      fallback_model: "openai:gpt-4o"

workflow_config:
  step_timeout: 60
  max_retries: 3
  enable_parallel: true

local_model_management:
  enabled: true
  auto_download_from_huggingface: true
  preferred_queries:
    code_generation: "coder gguf instruct"
    semantic_parsing: "small instruct gguf"
    document_generation: "instruct gguf"
    long_context_analysis: "long context gguf"
    default: "instruct gguf"

development:
  mock_llm_calls: false
  enable_debug_logs: false
